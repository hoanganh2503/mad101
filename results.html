<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kết quả của tôi · MAD101</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="top"></div>
<div class="container">
  <div class="flex" style="justify-content:space-between">
    <div>
      <h1 style="margin-bottom:2px">Kết quả của tôi</h1>
      <div class="muted small">Lưu trên trình duyệt máy này. Tải file về để nộp cho giảng viên / lưu trữ.</div>
    </div>
    <div class="flex">
      <button class="btn" id="csvBtn">⬇ Tải CSV</button>
      <button class="btn ghost" id="jsonBtn">⬇ Tải JSON</button>
      <button class="btn ghost danger" id="clearBtn">Xoá lịch sử</button>
    </div>
  </div>

  <div id="summary" class="grid cols" style="margin:16px 0"></div>
  <div class="card">
    <table>
      <thead><tr><th>#</th><th>Bộ</th><th>Đề</th><th>Điểm</th><th>Đúng/Tổng</th><th>Thời gian</th><th>Nộp lúc</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="muted" style="padding:14px;display:none">Chưa có kết quả nào. <a href="index.html">Vào làm một đề →</a></div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
document.getElementById('top').outerHTML = renderTopbar('results.html');

function render() {
  const results = getResults();
  const rows = document.getElementById('rows');
  const empty = document.getElementById('empty');
  rows.innerHTML = '';
  empty.style.display = results.length ? 'none' : 'block';

  results.forEach((r, i) => {
    rows.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${i + 1}</td>
        <td><span class="pill">${r.section}</span></td>
        <td>${r.examName}</td>
        <td><b>${r.score}%</b></td>
        <td>${r.correct}/${r.total}</td>
        <td>${fmtTime(r.timeSec)}</td>
        <td class="small">${fmtDate(r.finishedAt)}</td>
        <td><a class="small" href="exam.html?exam=${encodeURIComponent(r.examId)}&review=1">Xem lại</a></td>
      </tr>`);
  });

  // tóm tắt
  const sum = document.getElementById('summary');
  if (!results.length) { sum.innerHTML = ''; return; }
  const attempts = results.length;
  const exams = new Set(results.map(r => r.examId)).size;
  const avg = Math.round(results.reduce((a, r) => a + r.score, 0) / attempts * 10) / 10;
  const best = Math.max(...results.map(r => r.score));
  const totalTime = results.reduce((a, r) => a + (r.timeSec || 0), 0);
  const box = (label, val) => `<div class="card"><div class="muted small">${label}</div><div style="font-size:24px;font-weight:800">${val}</div></div>`;
  sum.innerHTML = box('Lượt làm', attempts) + box('Số đề đã làm', exams) +
    box('Điểm TB', avg + '%') + box('Điểm cao nhất', best + '%') +
    box('Tổng thời gian', fmtTime(totalTime));
}

function toCSV() {
  const results = getResults();
  const head = ['section', 'examName', 'examId', 'score_percent', 'correct', 'total', 'time_seconds', 'time_mmss', 'finishedAt'];
  const esc = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const lines = [head.join(',')];
  for (const r of results) {
    lines.push([r.section, r.examName, r.examId, r.score, r.correct, r.total, Math.round(r.timeSec), fmtTime(r.timeSec), r.finishedAt].map(esc).join(','));
  }
  return '﻿' + lines.join('\r\n'); // BOM để Excel đọc đúng tiếng Việt
}

document.getElementById('csvBtn').addEventListener('click', () => {
  if (!getResults().length) return toast('Chưa có kết quả');
  downloadFile('mad101-ket-qua.csv', toCSV(), 'text/csv;charset=utf-8');
});
document.getElementById('jsonBtn').addEventListener('click', () => {
  if (!getResults().length) return toast('Chưa có kết quả');
  downloadFile('mad101-ket-qua.json', JSON.stringify(getResults(), null, 2), 'application/json');
});
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Xoá toàn bộ lịch sử kết quả & đánh dấu đã làm trên máy này?')) return;
  localStorage.removeItem('mad101.results.v1');
  localStorage.removeItem('mad101.progress.v1');
  render(); toast('Đã xoá');
});

render();
</script>
</body>
</html>
